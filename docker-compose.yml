version: '3.8'

services:
  transparent:
    build: .
    restart: unless-stopped
    volumes:
      # Mount the local project repo into /data so the service can git push
      - .:/data
      # Mount SSH keys so git can authenticate with GitHub
      - ~/.ssh:/root/.ssh:ro
    environment:
      - TZ=UTC
    expose:
      - "8080"
    command: ["./transparent", "-repo", "/data", "-immediate"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transparent.rule=Host(`transparent.localhost`)"
      - "traefik.http.services.transparent.loadbalancer.server.port=8080"
