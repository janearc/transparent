version: '3.8'

services:
  transparent:
    build: .
    restart: unless-stopped
    volumes:
      - .:/data
      - ~/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/work:/work:ro
    environment:
      - TZ=UTC
    ports:
      - "127.0.0.1:8081:8080"
    expose:
      - "8080"
    command: ["./transparent", "-repo", "/data", "-immediate"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transparent.rule=Host(`transparent.localhost`)"
      - "traefik.http.services.transparent.loadbalancer.server.port=8080"
